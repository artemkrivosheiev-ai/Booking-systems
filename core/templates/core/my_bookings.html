{% extends "core/base.html" %}

{% block content %}
<h1>Мої бронювання</h1>

{% if bookings %}
    {% for booking in bookings %}
        <div class="card mb-3">
            <div class="card-body">
                <h5>{{ booking.room.name }}</h5>
                <p>Заїзд: {{ booking.check_in }}</p>
                <p>Виїзд: {{ booking.check_out }}</p>

                <a href="{% url 'core:cancel_booking' booking.id %}" class="btn btn-danger">
                    Скасувати
                </a>
            </div>
        </div>
    {% endfor %}
{% else %}
    <p>У вас ще немає бронювань.</p>
{% endif %}

{% endblock %}
